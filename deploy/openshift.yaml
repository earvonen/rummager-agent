# Example OpenShift manifests. Adjust namespaces, image, and secrets for your cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rummager-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rummager-agent-pod-logs
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rummager-agent-pod-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rummager-agent-pod-logs
subjects:
  - kind: ServiceAccount
    name: rummager-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rummager-agent-config
data:
  RUMMAGER_KUBERNETES_NAMESPACE: "agentic-demo"
  RUMMAGER_POD_LABEL_NAME: "app"
  RUMMAGER_POD_LABEL_VALUE: "redhat-screensaver"
  RUMMAGER_GIT_CLONE_URL: "https://github.com/earvonen/redhat-screensaver.git"
  RUMMAGER_GIT_BRANCH: "test"
  RUMMAGER_POLL_INTERVAL_SECONDS: "10"
  # Optional: only include log lines from the last N seconds (Kubernetes sinceSeconds)
  RUMMAGER_LOG_MAX_AGE_SECONDS: "20"
  RUMMAGER_STATE_FILE: "/var/lib/rummager-agent/state.json"
  RUMMAGER_WORKSPACE_ROOT: "/var/lib/rummager-agent/workspaces"
  LLAMA_STACK_BASE_URL: "http://llamastack-service:8321"
  # GitHub auth/PAT lives on the GitHub MCP server registered with Llama Stack, not in this pod.
  RUMMAGER_TOOL_GROUP_IDS: "mcp-openshift,mcp-github"
  # Optional: register MCP SSE endpoints at startup (JSON array)
  # RUMMAGER_MCP_REGISTRATIONS_JSON: '[{"toolgroup_id":"mcp::github","mcp_uri":"http://github-mcp:8080/sse"}]'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rummager-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rummager-agent
  template:
    metadata:
      labels:
        app: rummager-agent
    spec:
      serviceAccountName: rummager-agent
      containers:
        - name: rummager-agent
          image: image-registry.openshift-image-registry.svc:5000/agentic-demo/rummager-agent:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: rummager-agent-config
          env:
            - name: HOME
              value: /var/lib/rummager-agent
            # Optional: GITHUB_TOKEN only if you need HTTPS clone of private repos or REST PR fallback
            # - name: GITHUB_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: rummager-agent-github
            #       key: token
            # - name: LLAMA_STACK_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: llama-stack-credentials
            #       key: api-key
            # - name: LLAMA_STACK_MODEL_ID
            #   value: "your-registered-model-id"
          volumeMounts:
            - name: data
              mountPath: /var/lib/rummager-agent
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          emptyDir: {}
